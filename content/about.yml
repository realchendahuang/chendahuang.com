title: 关于我
description: 前 AI 产品经理，现在做独立开发。写 Playbook，做 Agent Skill，在 X 上分享 AI 效率和工具折腾。
content: |
  我是 **陈大黄**。前 AI 产品经理，现在做独立开发。

  主要做两件事：把踩过的坑写成 Playbook，把写作和运营经验收成 Agent Skill。能用、能跑、能省时间，比口号重要。

  ### 我在做什么

  **Playbook** 是实战手册。Cloudflare 那本按功能模块、工作流、计费、架构和避坑来写；macOS 那本从零上手到用顺手，写给普通人。

  **Agent Skill** 是给 AI 编码助手装的能力包。dahuang-human-tone 去中文 AI 味，dahuang-ai-tone 给文本加模型风格。

  ### 方法

  先自己用，用顺了再整理。Playbook 是踩坑记，Skill 是实际写作里磨出来的规则。

  ### 找我

  最快在 [X](https://x.com/realchendahuang) 上找我，代码去 [GitHub](https://github.com/realchendahuang)。项目汇总在 [Playbook](/playbooks) 和 [Skill](/skills)。
