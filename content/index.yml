faq:
  title: 常见问题
  description: 这个站放什么，以及怎么找到我。
  categories:
    - title: 关于我
      questions:
        - label: 你是谁？
          content: |
            陈大黄。前 AI 产品经理，现在做独立开发。这个站主要陈列我的作品和内容。
        - label: 你在做什么？
          content: |
            做开源项目，写 Playbook 和 Agent Skill，也把长文和 X 上值得留下来的内容放在这个站里。
        - label: 怎么联系你？
          content: |
            最快在 X 上找我 [@realchendahuang](https://x.com/realchendahuang)，代码相关去 [GitHub](https://github.com/realchendahuang)。
    - title: Playbook
      questions:
        - label: Playbook 是什么？
          content: |
            我写的实战手册，把功能、工作流、计费、架构和实际踩过的坑放在一起。目前有 Cloudflare、Codex 和 macOS 三本。
        - label: 在哪里看？
          content: |
            去 [/playbooks](/playbooks) 看汇总，也可以直接在线读。每本都有对应的 GitHub 仓库。
        - label: 现在有几本？
          content: |
            三本：Cloudflare 实战手册、Codex Playbook 和 macOS 实战指南。
    - title: Skill
      questions:
        - label: Skill 是什么？
          content: |
            给 AI 编码助手（Claude Code、Cursor、Codex 等）安装的能力包。每个 Skill 解决一类具体任务。
        - label: 你做了哪些 Skill？
          content: |
            dahuang-human-tone 去中文 AI 味；dahuang-ai-tone 分析和模仿不同模型的写作风格；dahuang-x-post 打磨中文 X 短帖和 Thread。
        - label: 怎么装？
          content: |
            去 [/skills](/skills) 看介绍，每张卡片上有安装命令，复制到终端跑一下就行。
