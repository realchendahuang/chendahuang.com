faq:
  title: 常见问题
  description: 关于我和我在做的事，一些常见问题的回答。
  categories:
    - title: 关于我
      questions:
        - label: 你是谁？
          content: |
            我是陈大黄。前 AI 产品经理，现在做独立开发者。喜欢折腾 AI 效率工具，研究怎么高效学语言，也把产品、设计、开发、运营、销售都干了一遍。
        - label: 你在做什么？
          content: |
            主要是开源项目和 Agent Skill。写了几本 Playbook（Cloudflare、macOS），做了去 AI 味和加 AI 味的 Skill。这些都放在 GitHub 上，在线阅读地址也在这个站。
        - label: 怎么联系你？
          content: |
            最快的方式是在 X 上找我 [@realchendahuang](https://x.com/realchendahuang)，代码相关去 [GitHub](https://github.com/realchendahuang)。
    - title: Playbook 和 Skill
      questions:
        - label: Playbook 是什么？
          content: |
            是我整理的实战手册。不是抄官方文档，是自己踩完坑之后整理出来的实操路径和避坑指南。现在有 Cloudflare 和 macOS 两本，都在持续更新。
        - label: Skill 是什么？
          content: |
            是给 AI 编码助手（Claude Code、Cursor、Codex 等）装的能力包。我做了两个：dahuang-human-tone 去中文 AI 味，dahuang-ai-tone 给文本加模型风格的味。
        - label: 在哪里看？
          content: |
            Playbook 在这个站的 [/playbooks](/playbooks) 页面有汇总，也可以直接在线读。Skill 在 [/skills](/skills) 页面有介绍，安装方式在对应 GitHub 仓库里。
