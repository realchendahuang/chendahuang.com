faq:
  title: 常见问题
  description: 关于我和我在做的事。
  categories:
    - title: 关于我
      questions:
        - label: 你是谁？
          content: |
            陈大黄。前 AI 产品经理，现在做独立开发。主要写 Playbook、做 Agent Skill，也在 X 上分享 AI 效率和工具折腾。
        - label: 你在做什么？
          content: |
            两类东西：Playbook 和 Agent Skill。Playbook 是实战手册，Skill 是给 AI 编码助手装的能力包。都在 GitHub 开源。
        - label: 怎么联系你？
          content: |
            最快在 X 上找我 [@realchendahuang](https://x.com/realchendahuang)，代码相关去 [GitHub](https://github.com/realchendahuang)。
    - title: Playbook
      questions:
        - label: Playbook 是什么？
          content: |
            实战手册。按真正会用到的顺序写：功能模块、AI 编程工作流、计费对比、架构模式和避坑。现在有 Cloudflare 和 macOS 两本。
        - label: 在哪里看？
          content: |
            去 [/playbooks](/playbooks) 看汇总，也可以直接在线读。每本都有对应的 GitHub 仓库。
        - label: 现在有几本？
          content: |
            两本：Cloudflare 实战手册和 macOS 实战指南。还有更多在路上。
    - title: Skill
      questions:
        - label: Skill 是什么？
          content: |
            给 AI 编码助手（Claude Code、Cursor、Codex 等）装的能力包。一行命令安装，装完助手就多一项本事。
        - label: 你做了哪些 Skill？
          content: |
            dahuang-human-tone 去中文 AI 味；dahuang-ai-tone 把文本改写成 GPT / Claude / Gemini / 豆包的风格，或判断一段文本更像哪个模型。
        - label: 怎么装？
          content: |
            去 [/skills](/skills) 看介绍，每张卡片上有安装命令，复制到终端跑一下就行。
