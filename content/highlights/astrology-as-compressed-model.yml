content: |
  突然想到一个挺有意思的角度。

  星座、生肖、星象、算命这些东西，可能可以理解成人类低算力时代的「压缩模型」。

  古人没有数据库，没有统计学工具，也没有 AI。

  他们只能长期观察季节、天象、农时、性格、人情世故和社会周期，然后把这些复杂经验压缩成一套容易记忆、容易传播的符号系统。

  12 星座、12 生肖、八字、卦象，本质上都像是在把复杂世界降维。

  它当然不能当成严格科学预测。

  但它也未必只是纯粹的迷信。

  更像是古人在算力不足、数据不足、工具不足的情况下，用故事、符号和规则做出来的一种经验蒸馏。
