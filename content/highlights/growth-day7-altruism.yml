  运营第 7 天破 2000 粉丝，简单复盘一下。

  核心就一个字：利他。

  我主要分享了两类干货：

  - macOS 重度使用软件清单（48k 阅读）
  - Cloudflare 免费额度表 + Playbook（X 上数据不错，还被老哥搬运洗稿到知乎，竟然得了好几百收藏）
  - 还有 OPC 一人公司资源推荐（38k 阅读）

  没想着怎么涨粉，就是把研究清楚的东西整理好免费给出去。结果反而涨得快。

  后面继续输出这类实用内容。感谢大家支持。
