  小试了一下腾讯的 Workbuddy，有一个很经典的场景，叫做领美团优惠券。

  在登录环节，它生成了一个二维码，让我扫码登录。

  然后我再吼一声帮我领优惠券，它就帮我领了那么多。

  把 AI Agent 用在领优惠券这样的场景，非常 amazing。
