content: |
  最近在重新思考知识管理这件事。

  我发现这里其实有两条路线。

  **一条是基于飞书搭建。**

  它的优势很直接：

  免费、多端同步、可分享、协作方便，形态也足够丰富。

  文档、多维表格、表格、幻灯片、画布、Todo、知识库，这些模块组合起来，已经能覆盖很多个人和团队的知识管理场景。

  我尤其看好多维表格。

  它很适合作为一个知识中枢。

  信息收集、资料归档、状态管理、结构化整理、内容再生产，都可以围绕它展开。

  再加上飞书 CLI 和 AI Agent，飞书就不只是一个办公软件了。

  它更像一个可以被 Agent 操作的知识工作流系统。

  **另一条路线是基于 Cloudflare 自研。**

  这条路更自由，也更适合产品化。

  比如我现在正在做的 FlareMo，就是想基于 Cloudflare 去做一个知识管理产品。

  Cloudflare 的好处是底层能力很完整：

  前端、后端、数据库、对象存储、向量检索、AI 能力，都可以组合起来。

  但它需要开发。

  也需要自己设计数据结构、搜索体验、权限系统和产品逻辑。

  所以我现在的判断是：

  - 飞书适合快速搭一套能马上用的知识管理系统。
  - Cloudflare 适合把知识管理做成一个真正可控、可迭代的产品。

  这两条路线都值得研究。

  一个偏工作流。

  一个偏产品化。
