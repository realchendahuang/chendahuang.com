content: |
  分享一下我珍藏多年的浏览器插件。

  - **Wetab**：新标签页插件，可以把常用东西放进来，还能自定义搜索引擎，登录账号免费多端同步。我在上面专门搞了一个基于谷歌的 X 搜索引擎，比自带的好用多了。
  - **Video Speed Controller**：灵活调节视频倍速，适合高效摄入知识。
  - **XHunt**：玩 X 必备，可以看到每个 KOL 的排行榜，以及当前最热门的帖子。
  - **X 互关雷达**：在页面标记互关和单向关注关系，并可选择显示 following / followers 关注率。
  - **FireShot**：捕捉网页截图，编辑并保存为 PDF、JPEG、GIF、PNG 或 BMP。
  - **Proton Pass**：设计优雅的账号密码管理工具，多端同步。
  - **沉浸式翻译**：老牌双语翻译插件，接入 DeepSeek V4 Flash API。
  - **Codex**：Codex 连接 Chrome 浏览器必备，有了它可以自动化任何在浏览器上的事情，比如账号被封写申诉邮件。
