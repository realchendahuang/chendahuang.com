  有老哥问：

  有没有 Claude Code 比较好的分析文档可以学习？

  我的回答是，在 AI 时代，一定要处处想着 AI，要让 AI 辅助你去学习。

  如果真的想学 Agent 原理。

  可以去看看 Pi Agent 这个项目。

  麻雀虽小五脏俱全，太适合学习了，代码质量还很高。

  Claude Code 并非开源，是源码泄露。

  Pi Agent 才是真正的开源。
