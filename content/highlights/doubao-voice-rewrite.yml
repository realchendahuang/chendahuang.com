  给大家分享一个洗稿的小技巧。

  可以用豆包输入法语音转文字。

  一边看着需要整理的稿子。

  一边口喷，把它按照自己的话复述出来。

  这样的 AI 味更少。

  效率还高，还不花钱，还不用充会员。

  在任何场合都能随时随地语音输入，提高输出效率。
