content: |
  我是王小波门下走狗，

  他有趣，但不油滑。
  他幽默，但有逻辑。
  他反感愚蠢，也反感一本正经地愚蠢。

  如果王小波活在 AI 时代，

  他可能会说：

  终于有个东西，可以帮普通人少干点蠢活，多留点时间，去想一些真正有意思的事情了。

  这也是我喜欢 AI 的原因。

  不是因为它神。

  是因为它能让人少受一点无聊劳动的折磨。
