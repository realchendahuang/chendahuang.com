  最近刷 X 的频率降下来了。

  不知道是不是进入了贤者模式。

  仔细反省之后，我发现自己更关心一个问题：

  我每天刷的这些东西最后能不能变成真实产品。

  看再多工具更新，不如把一个具体场景打穿。

  这段时间我想把更多精力放在产品、社区和长期内容上。
