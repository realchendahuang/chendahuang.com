  AI 时代新的软件机会在哪里？

  比较大的一个机会是处理在传统软件层面无法被记录下来的这一部分，也就是说，一些非结构化的背景数据。

  比如说真正 AI native 的 CRM 软件，在记录给某个客户的折扣的时候，可以顺带记录为什么要给这个折扣，而不是另一个折扣，以及其他的方案为什么被否决，这其中是谁说服了谁？

  传统的软件有太多这样的隐藏信息是没有办法记录的，而 AI 时代可以利用对文字、对视频的理解能力，把这些隐藏的信息，大量的这些冗余的信息，提取出结构化的数据出来进行分析。
