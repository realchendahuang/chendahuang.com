content: |
  AI 时代，最重要的能力，是元技能。

  说白了，就是那些你换一个工具、换一个模型、换一个行业，依然能用上的底层本事。

  - 你能不能把问题讲清楚？
  - 能不能把一堆乱材料整理明白？
  - 能不能把一个模糊想法拆成几步？
  - 能不能看出 AI 哪些地方说得对，哪些地方在胡扯？
  - 能不能和 AI 来回磨，把一个粗糙答案慢慢改成能用的东西？

  这些东西，比收藏一堆工具更值钱。

  工具每天都在变，模型也会一代一代换。

  但会提问、会整理、会判断、会拆解、会验收的人，走到哪里都能用 AI 放大自己。

  AI 时代真正拉开差距的，可能就是这些看起来很基础，但长期最值钱的元技能。
