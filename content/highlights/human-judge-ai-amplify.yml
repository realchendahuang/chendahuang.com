content: |
  人负责判断。AI 负责放大。

  人的注意力是有限的。人只负责最关键的那一部分判断。

  一定要把有限的注意力分配在有价值的地方。让 AI 去做更多的垃圾活。

  这个就是 AI 工作流存在的意义。

  让 AI 工作流把垃圾活给包圆了，人负责最终的判断，最有价值的、最核心的、最终目标的这种审核或者结果的验收。

  这就是我比较想达成的一种状态。我最近也在没事研究这些工作流。
