  分享一个 X 发帖小心得：

  每条帖子都要有独立性。

  因为你不是这个世界的中心，没人会特地点开你的主页，去了解事情的来龙去脉。

  一个陌生人第一次刷到你，就应该立刻收获一个观点，或者一个 know-how。

  这样的帖子，才有价值。
