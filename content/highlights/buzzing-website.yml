  分享一个宝藏网站：Buzzing

  它适合想拓宽信息源、想打破信息茧房的人。

  它会持续抓取 Hacker News、Reddit、BBC、Reuters、Bloomberg、Product Hunt 等国外热门内容，并把标题翻译成中文。

  它最大的价值是让你先用中文把标题浏览一遍。

  如果看到感兴趣的、值得阅读的文章，再点进去看详情。

  这时候可以配合沉浸式翻译做双语阅读。
