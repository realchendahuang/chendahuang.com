content: |
  今天是正式入驻 OPC 办公室的第一天。我给大家讲一下我开 OPC 的过程经历。

  我的初心只是为了有一个合规的主体可以收钱，可以上架产品。所以我就在网上找相关的公司注册信息。

  我对城市没有太大的要求：南京、苏州、杭州、宁波，只要是沿海发达地区，都是我的备选地。

  机缘巧合之下，某天来南京出差，闲来无事，刷了刷南京相关的公众号。翻到了一个 OPC 社区的联系人的电话。然后我就加了上去。

  在简单介绍了我自己的项目以后，负责人觉得 OK，就安排下午去现场参观了。

  他们提出的要求是每周有三天时间驻场办公，如果我能接受的话，就可以让我在这边注册公司。

  因为是南京国资旗下的项目，他们的政策条件非常好，水电网物业全都是免费的，理论上免费三年，甚至还有专门的代账会计帮我注册公司，帮我刻章，帮我拿营业执照，帮我联系银行开户，感动到离谱啊。

  在经历了两三个星期的注册流程以后，终于是拿到了所有的材料。

  园区经理让我在这里选一个自己的工位。我对工位的要求并不高，只要有座位、有板凳、有电就行。

  园区经理让我填三张申请项目的表格，主要是介绍自己的项目的优势、团队的成员的情况、跟 AI 结合的特长。如果写得好的话，比较靠谱的话，会有机会拿到 5~10 万的政策补贴。

  我觉得南京这一块搞的是真的好。大家也可以看看自己的城市是否有相关的政策，或者自己的省会有没有更好的政策。

  好的政策不等人，一定要多多去打听，我今天到这里的时候，其实这个园区已经有好多公司入驻了，我算比较晚的了。

  今天分享就是这些，后面我会持续地分享我整个创业的经验和过程复盘。

  感谢大家的关心。
