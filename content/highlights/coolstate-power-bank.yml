  有朋友问我，图里面的充电宝是什么牌子？

  好了，我要开始安利了。

  这是酷态科 25 号超级电能块 SE（酷态科就是曾经的紫米）。

  140 多块钱，25000 毫安时，最高 120 瓦输出，自带充电线。

  可以让我的 MacBook Air 持续一下午高强度工作。

  是斯达巴克斯、麦当劳、肯德基、下乡等场所的办公良品！
