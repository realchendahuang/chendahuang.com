content: |
  给大家讲讲我公司取名的经历吧。

  我是用 GPT 5.5 和 Gemini 3.1 Pro，用这两个模型经历了多次的头脑风暴，想了两三天都没想到好名字。

  为什么呢？因为我发现这些模型它没有创新。它给你的名字选项都是词藻的堆砌和字的组合。

  你提出自己的想法，他就来回车轱辘话给你滚来滚去，气得我高血压都犯了。

  还有一个很大的问题，你好不容易想到几个比较满意的名字，打开企查查一看，好家伙，要么被注册了，要么有雷同的。

  这里可以推荐一下阿里巴巴的 88 查，类似于企查查，但是免费，可以用它查查有没有雷同的名字。

  取名字如果不想一直重复，最好取四个字的，思路一定要开阔。

  一定要多换几种模型，换几种不同的脑子。

  可以给 AI 一些好名字作为参考，比如说 DeepSeek 深度求索、ByteDance 字节跳动。

  这你认为的好名字，让 AI 去参考参考。博采众家之长，才能有牛逼的名字出现。
