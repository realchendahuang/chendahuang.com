content: |
  今天有朋友在我的评论区分享了关于一人公司相关的股权责任问题。

  首先，非常感谢这位朋友的友善提醒。

  他的观点是，必须要让自己的家人承担至少 1% 的股份。

  一人有限公司的问题是：只有一个股东时，如果说不清公司钱和个人钱是分开的，股东可能要对公司债务承担连带责任。《公司法》第 23 条就是这个逻辑。

  如果公司有多个股东，这样公司就从「一人公司」变成「普通有限责任公司」，从而避开一人公司的特殊举证风险，给自己多一层低成本缓冲。

  希望给大家做作参考。

  但是我们平时要注意公私账要分明。争取做到每一笔重要的钱都能说清楚。

  - 钱从哪里来，为什么来，进了哪个账户。
  - 钱花到哪里去，为什么花，谁批准的。
  - 你从公司拿钱，是工资、报销、借款，还是分红。

  这三件事情我们讲清楚了，风险就能大大降低。
