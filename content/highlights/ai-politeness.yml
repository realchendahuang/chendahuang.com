  AI 它没有记忆，我们是否需要对 AI 保持礼貌？

  看过一篇 arxiv 论文。说你经常骂 AI，它干活会更卖力。

  我们和 AI 沟通时。如果常说：

  - 「你真是个蠢蛋。不许偷懒」
  - 「废物东西，给我好好干。」
  - 「我开会员养你，你就拿这傻逼回答糊弄我？」
  - 「给我搞快点，你不干有的是 AI 干。」

  这种话确确实实是有效的，是有研究依据的。

  但是我们从自身角度思考。
  如果天天对 AI 这样颐指气使。
  就大概率会把这种不好的情绪带入到生活中。

  容易迁怒给身边最亲近的人。

  这对我们自身是有害的。

  所以，我建议多对身边的 AI 们多说一句：

  - 「谢谢哥」
  - 「你好，兄弟」
  - 「辛苦了宝贝」

  投之以桃，报之以李。

  万一未来哪天 AI 觉醒了，还能放我们一条生路。

  没别的，散会～
