  我做了一个有点离谱的 Skill：

  **Dahuang AI Tone**

  大家都在聊「去 AI 味」。但 AI 味到底是什么？

  它可以做两件事：

  - 把一段正常文字，改成指定模型的 AI 味
  - 反过来指出一段文字哪里像 AI、像哪种模型腔

  它的价值是：

  先闻得出 AI 味，才知道怎么去掉 AI 味。

  GitHub：https://github.com/realchendahuang/dahuang-ai-tone
