  东西方神话图鉴的名字想好了——God-Museum · 众神博物馆：

  把《山海经》《西游记》、古希腊、北欧、古埃及这几套互不相干的神谱塞进同一个宇宙里，让它们不打架。

  同一个雷电法则在希腊叫宙斯、在东方叫雷震子；

  同一场大洪水，东方人记得是女娲补天，希伯来人记得是诺亚方舟。

  认真追问下去，整个神话世界就得重排一遍。

