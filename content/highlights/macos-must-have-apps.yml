content: |
  macOS 深度使用多年，我总结了下面这几个牛逼的软件：

  - **QuickRecorder**：录屏神器，体积小，功能强大。
  - **ClashParty**：科学上网，Mihomo 内核，支持协议多，更新快，界面美观。
  - **V2rayN**：科学上网，支持协议多，界面复古了一点，好在稳定，免费。
  - **豆包输入法**：语音输入准的一批，支持 macOS、iOS、Android，Windows 还在路上。
  - **Brave**：隐私优先的浏览器，自带广告过滤，比插件过滤得更干净，看油管子最佳伴侣。
  - **Mos**：让你的鼠标滚轮滚动得更加丝滑。
  - **Amphetamine**：让你的笔记本合盖也不会息屏，Vibe Coding 最佳伴侣。
  - **UU 远程**：网易出品的远程桌面工具，免费，速度快。有了它以后限制画质的从来不是会员，是网速。我一般用它通过手机遥控 macOS 看 Vibe Coding 的结果，按键映射效率太高了。
  - **Tencent Lemon**：腾讯出品的 macOS 垃圾清理软件，卸载软件很丝滑，状态栏图标也好用。
  - **Mole**：macOS 最强垃圾清理软件，终端版免费，UI 版收费。
  - **Tailscale**：基于 WireGuard 的远程异地组网软件。有了它，你可以在天涯海角连上自家的小电脑。
  - **Obsidian**：AI 时代，本地优先的知识管理工具。生态太好了，搭配官方 Web Clipper 浏览器剪藏插件有奇效。
