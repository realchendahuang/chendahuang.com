  我宣布：

  Cloudflare 是真正的 AI Native 公司。

  它真的在围绕 AI Agent 重做开发者体验。

  刚刚发布的 Temporary Accounts 可以让 AI Agent 写完代码，直接部署，拿到临时 URL，自己测试，自己迭代。

  丝滑的一批。

  结合 Cloudflare 官方 Skills，一行命令安装：

  `npx skills add cloudflare/skills`

  什么叫 AI Native 啊？

  这才是 AI Native 的 GOAT。
